<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotiseek</title>
<style>
:root{
  --bg:#f5f5f7; --surface:#ffffff; --surface-2:#fbfbfd; --surface-3:#f0f0f3;
  --text:#1d1d1f; --text-2:#6e6e73; --text-3:#a1a1a6; --text-4:#c7c7cc;
  --hair:rgba(0,0,0,.08); --hair-2:rgba(0,0,0,.05);
  --blue:#0071e3; --blue-tint:rgba(0,113,227,.10);
  --green:#30b352; --orange:#f08400; --red:#ff453a; --purple:#8a5cf6;
  --r:20px; --r-md:14px; --r-sm:10px;
  --sh-1:0 1px 2px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.03);
  --sh-2:0 2px 8px rgba(0,0,0,.05), 0 12px 28px -10px rgba(0,0,0,.10);
  --font:-apple-system,"SF Pro Display","SF Pro Text",system-ui,"Segoe UI",sans-serif;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.45;
  -webkit-font-smoothing:antialiased;overflow:hidden;letter-spacing:-.011em}
.num{font-variant-numeric:tabular-nums;letter-spacing:0}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.16);border-radius:9px;border:2px solid transparent;background-clip:padding-box}
::selection{background:var(--blue-tint)}

.app{display:grid;grid-template-columns:240px 1fr;height:100vh}

/* ---------- sidebar ---------- */
.rail{background:rgba(250,250,252,.7);backdrop-filter:saturate(180%) blur(20px);
  border-right:1px solid var(--hair);display:flex;flex-direction:column;padding:18px 12px}
.brand{display:flex;align-items:center;gap:11px;padding:8px 10px 18px}
.brand .mark{width:30px;height:30px;border-radius:8px;flex:none;
  background:linear-gradient(135deg,#0a84ff,#0058c9);display:grid;place-items:center;
  box-shadow:0 4px 10px -2px rgba(10,132,255,.5)}
.brand .mark svg{width:17px;height:17px;color:#fff}
.brand h1{font-size:18px;font-weight:600;letter-spacing:-.02em}
.sect{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.02em;padding:16px 12px 6px}
.nav{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:var(--r-sm);color:var(--text-2);
  cursor:pointer;font-weight:500;font-size:13.5px;transition:.15s;margin:1px 0}
.nav svg{width:18px;height:18px;flex:none}
.nav:hover{background:rgba(0,0,0,.04);color:var(--text)}
.nav.active{background:var(--blue-tint);color:var(--blue)}
.nav .badge{margin-left:auto;font-size:11px;font-weight:600;color:var(--text-3)}
.nav.active .badge{color:var(--blue)}
.rail-foot{margin-top:auto;padding:10px}
.rail-foot .st{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);padding:5px 4px}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.dot.ok{background:var(--green)} .dot.off{background:var(--text-4)} .dot.warn{background:var(--orange)}
.rail-foot .st .v{margin-left:auto;color:var(--text-3);font-size:11.5px}

/* ---------- main ---------- */
.main{overflow-y:auto;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;padding:20px 36px 16px;
  background:rgba(245,245,247,.72);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hair-2)}
.title{font-size:26px;font-weight:700;letter-spacing:-.03em}
.title small{font-size:13px;font-weight:400;color:var(--text-2);margin-left:11px;letter-spacing:-.01em}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.05);border-radius:10px;
  padding:8px 12px;width:220px;transition:.2s;color:var(--text-3)}
.search:focus-within{background:#fff;box-shadow:0 0 0 4px var(--blue-tint),inset 0 0 0 1px var(--blue);width:260px;color:var(--text)}
.search svg{width:15px;height:15px;flex:none}
.search input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13.5px;width:100%}
.search input::placeholder{color:var(--text-3)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:10px;font-family:var(--font);
  font-weight:500;font-size:13.5px;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#0077ed}
.btn-blue:active{transform:scale(.97)}
.btn-soft{background:rgba(0,0,0,.05);color:var(--text)}
.btn-soft:hover{background:rgba(0,0,0,.08)}

.screen{display:none;padding:26px 36px 64px;animation:fade .4s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.reveal{animation:rise .5s cubic-bezier(.22,.7,.25,1) backwards}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.sect-h{display:flex;align-items:baseline;gap:12px;margin:32px 0 16px}
.sect-h:first-child{margin-top:4px}
.sect-h h2{font-size:20px;font-weight:600;letter-spacing:-.02em}
.sect-h .meta{margin-left:auto;font-size:12.5px;color:var(--text-3)}
.sect-h .link{margin-left:auto;font-size:13px;color:var(--blue);cursor:pointer;font-weight:500}

/* ---------- cover ---------- */
.cover{position:relative;overflow:hidden;flex:none;background-size:cover;background-position:center;
  box-shadow:inset 0 0 0 .5px rgba(0,0,0,.10);transition:transform .3s}
.cover .ini{position:absolute;inset:0;display:grid;place-items:center;font-weight:600;color:rgba(255,255,255,.92);
  text-shadow:0 1px 4px rgba(0,0,0,.25)}
.cover.loaded .ini{opacity:0}

/* ---------- stat cards ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:16px}
.stat{background:var(--surface);border-radius:var(--r);padding:20px;box-shadow:var(--sh-1);transition:.25s}
.stat:hover{box-shadow:var(--sh-2);transform:translateY(-2px)}
.stat .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;margin-bottom:16px;color:#fff}
.stat .ic svg{width:16px;height:16px}
.stat .val{font-size:30px;font-weight:600;letter-spacing:-.03em;line-height:1}
.stat .val .u{font-size:15px;font-weight:500;color:var(--text-3);margin-left:3px}
.stat .lbl{color:var(--text-2);font-size:13px;margin-top:6px}

.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start;margin-top:26px}
@media(max-width:1080px){.two-col{grid-template-columns:1fr}}
.panel{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh-1);overflow:hidden}
.panel-h{display:flex;align-items:center;gap:10px;padding:16px 18px 14px}
.panel-h h3{font-size:15px;font-weight:600;letter-spacing:-.01em}
.panel-h .cnt{font-size:12.5px;color:var(--text-3)}
.panel-h .link{margin-left:auto;font-size:13px;color:var(--blue);cursor:pointer;font-weight:500}
.panel-body{padding:4px 8px 10px}

/* download row */
.dl{display:grid;grid-template-columns:46px 1fr auto;gap:13px;align-items:center;padding:9px 10px;border-radius:var(--r-sm);transition:.15s}
.dl:hover{background:rgba(0,0,0,.025)}
.dl .meta{min-width:0}
.dl .t{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.dl .a{color:var(--text-2);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-wrap{margin-top:8px;display:flex;align-items:center;gap:10px}
.prog{flex:1;height:5px;background:rgba(0,0,0,.08);border-radius:5px;overflow:hidden}
.prog i{display:block;height:100%;border-radius:5px;background:var(--blue);transition:width .9s linear}
.prog.green i{background:var(--green)}
.spd{font-size:11.5px;color:var(--text-2);white-space:nowrap;min-width:62px;text-align:right}
.dl .right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.qbadge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px;letter-spacing:0;white-space:nowrap}
.q-flac{background:rgba(48,179,82,.13);color:#1d8a3c}
.q-320{background:rgba(0,113,227,.11);color:var(--blue)}
.q-v0{background:rgba(138,92,246,.12);color:#7041e0}
.prov{font-size:11px;color:var(--text-3)}

/* activity */
.feed{padding:6px 4px}
.act{display:flex;gap:12px;padding:9px 12px}
.act .ad{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
.act .txt{font-size:13px;color:var(--text-2)}
.act .txt b{color:var(--text);font-weight:600}
.act .tm{font-size:11px;color:var(--text-3);margin-top:2px}

/* storage bar */
.storage{padding:18px}
.bar{height:12px;border-radius:8px;overflow:hidden;display:flex;background:var(--surface-3)}
.bar span{height:100%}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}
.legend .l{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2)}
.legend .l b{color:var(--text);font-weight:600;margin-left:2px}
.legend .sw{width:9px;height:9px;border-radius:3px}

/* ---------- cards grid (playlists / albums) ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:22px}
.tile{cursor:pointer;transition:.2s}
.tile:hover .cover{transform:translateY(-4px);box-shadow:var(--sh-2),inset 0 0 0 .5px rgba(0,0,0,.1)}
.tile .cover{width:100%;aspect-ratio:1;border-radius:var(--r-md);margin-bottom:11px}
.tile .pill{position:absolute;top:9px;right:9px;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;
  background:rgba(255,255,255,.82);backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px;color:var(--text)}
.tile .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.tile .info{display:flex;justify-content:space-between;margin-top:3px;color:var(--text-2);font-size:12px}
.tile .info .sync{color:var(--text-3);font-size:11.5px}
.minibar{height:3px;background:rgba(0,0,0,.07);border-radius:3px;margin-top:10px;overflow:hidden}
.minibar i{display:block;height:100%;background:var(--blue);border-radius:3px}

/* import strip */
.import{display:flex;gap:14px;background:var(--surface);border-radius:var(--r);padding:18px 20px;align-items:center;
  box-shadow:var(--sh-1);margin-bottom:8px}
.import .ic{width:40px;height:40px;border-radius:11px;background:var(--blue-tint);color:var(--blue);display:grid;place-items:center;flex:none}
.import .ic svg{width:20px;height:20px}
.import .txt{flex:1}
.import .txt .h{font-size:15px;font-weight:600;letter-spacing:-.01em}
.import .txt .d{color:var(--text-2);font-size:12.5px;margin-top:1px}
.input{background:var(--surface-3);border:none;border-radius:10px;padding:10px 14px;color:var(--text);
  font-family:var(--font);font-size:13.5px;outline:none;transition:.2s}
.input:focus{box-shadow:0 0 0 4px var(--blue-tint),inset 0 0 0 1px var(--blue);background:#fff}
.input::placeholder{color:var(--text-3)}

/* ---------- track list ---------- */
.tlist{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh-1);overflow:hidden}
.trow{display:grid;grid-template-columns:28px 40px 1fr 128px 84px 116px;gap:14px;align-items:center;
  padding:10px 18px;border-top:1px solid var(--hair-2);font-size:13.5px;transition:.12s}
.trow:hover{background:rgba(0,0,0,.022)}
.trow.head{border-top:none;font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--text-3);padding:13px 18px}
.trow .idx{color:var(--text-3);font-size:13px}
.trow .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.trow .ar{color:var(--text-2);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .dur{font-size:12.5px;color:var(--text-2);text-align:right}
.st{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500}
.st .d{width:7px;height:7px;border-radius:50%;flex:none}
.st-done{color:var(--green)} .st-done .d{background:var(--green)}
.st-dl{color:var(--blue)} .st-dl .d{background:var(--blue);animation:pulse 1.4s infinite}
.st-want{color:var(--text-3)} .st-want .d{background:var(--text-4)}
.st-fail{color:var(--red)} .st-fail .d{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.score{font-size:12px;color:var(--text-3)}
.score b{color:var(--text-2)}

/* detail header */
.dhead{display:flex;gap:24px;align-items:flex-end;margin-bottom:26px}
.dhead .cover{width:150px;height:150px;border-radius:18px;box-shadow:var(--sh-2)}
.dhead .kicker{font-size:11.5px;font-weight:600;letter-spacing:.03em;color:var(--text-3);text-transform:uppercase}
.dhead .h{font-size:34px;font-weight:700;letter-spacing:-.03em;margin:7px 0 4px}
.dhead .sub{color:var(--text-2);font-size:13.5px}
.dhead .actions{display:flex;gap:10px;margin-top:18px}

/* ---------- library artists ---------- */
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:24px}
.artist{cursor:pointer;text-align:center;transition:.2s}
.artist:hover .cover{transform:translateY(-4px);box-shadow:var(--sh-2)}
.artist .cover{width:100%;aspect-ratio:1;border-radius:50%;margin-bottom:12px}
.artist .nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist .ct{color:var(--text-3);font-size:11.5px;margin-top:2px}

/* ---------- wishlist ---------- */
.wish-form{display:flex;gap:10px;flex-wrap:wrap;background:var(--surface);border-radius:var(--r);padding:16px;box-shadow:var(--sh-1);margin-bottom:8px}
.seg{display:flex;background:var(--surface-3);border-radius:10px;padding:2px;gap:1px}
.seg button{background:none;border:none;color:var(--text-2);font-family:var(--font);font-weight:500;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.seg button.on{background:#fff;color:var(--text);box-shadow:var(--sh-1)}
.wish-list{display:flex;flex-direction:column;gap:10px}
.witem{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:var(--r-md);padding:12px 16px;box-shadow:var(--sh-1)}
.witem .cover{width:40px;height:40px;border-radius:9px}
.wtype{font-size:10.5px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--surface-3);color:var(--text-2);flex:none}
.witem .q{flex:1;font-weight:600;letter-spacing:-.01em}
.witem .stt{font-size:12px;color:var(--text-3)}

/* ---------- settings ---------- */
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
@media(max-width:980px){.set-grid{grid-template-columns:1fr}}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:13px 0;border-top:1px solid var(--hair-2)}
.set-row:first-child{border-top:none}
.set-row .k{font-weight:600;font-size:13.5px;letter-spacing:-.01em}
.set-row .k small{display:block;color:var(--text-2);font-weight:400;font-size:12px;margin-top:2px}
.toggle{width:44px;height:26px;border-radius:20px;background:#e3e3e8;position:relative;cursor:pointer;transition:.25s;flex:none}
.toggle i{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:.25s}
.toggle.on{background:var(--green)} .toggle.on i{left:20px}
.select{background:var(--surface-3);border:none;border-radius:9px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500}
.prio{display:flex;flex-direction:column;gap:8px}
.prio .p{display:flex;align-items:center;gap:11px;background:var(--surface-3);border-radius:10px;padding:11px 13px;font-weight:500}
.prio .p .num{font-size:12px;color:var(--text-3);width:14px;text-align:center}
.prio .p .gr{margin-left:auto;color:var(--text-4);cursor:grab}
.qchain{display:flex;flex-wrap:wrap;gap:7px;padding:10px 0}
.qchain .qc{font-size:12px;font-weight:500;padding:6px 11px;border-radius:8px;background:var(--surface-3);display:flex;align-items:center;gap:7px}
.qchain .qc .n{color:var(--text-3)}
.spotify-card{display:flex;align-items:center;gap:16px;background:var(--surface);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh-1);margin-bottom:18px}
.spotify-card .logo{width:46px;height:46px;border-radius:50%;background:#1db954;display:grid;place-items:center;flex:none}
.spotify-card .logo svg{width:30px;height:30px;color:#fff}
.spotify-card .info{flex:1}
.spotify-card .info .h{font-size:16px;font-weight:600;letter-spacing:-.01em}
.spotify-card .info .d{color:var(--text-2);font-size:12.5px;margin-top:2px}
.spotify-card .info .d .u{color:var(--green);font-weight:600}

/* live log */
.log{padding:16px 18px;font-family:var(--mono);font-size:11.5px;line-height:1.85;color:var(--text-2);
  background:var(--surface-2);border-radius:var(--r);box-shadow:var(--sh-1)}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3v13.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="8" cy="17" r="3.4" fill="#fff"/><path d="M12 5.5c4 0 6 1.4 7 2.6" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></div>
      <h1>Spotiseek</h1>
    </div>

    <div class="sect">Painel</div>
    <div class="nav active" data-screen="dashboard" data-title="Visão geral" data-sub="o estado da sua operação">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>Visão geral</div>
    <div class="nav" data-screen="playlists" data-title="Playlists" data-sub="sincronizadas do Spotify">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h11M4 17h7" stroke-linecap="round"/><circle cx="18" cy="16" r="2.6"/><path d="M20.6 16V9.5l-2.6.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Playlists<span class="badge">6</span></div>
    <div class="nav" data-screen="downloads" data-title="Downloads" data-sub="transferências em tempo real">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3.5v11m0 0l-3.5-3.5M12 14.5l3.5-3.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.5 20h15" stroke-linecap="round"/></svg>Downloads<span class="badge">3</span></div>
    <div class="nav" data-screen="library" data-title="Biblioteca" data-sub="sua coleção local">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/></svg>Biblioteca</div>
    <div class="nav" data-screen="wishlist" data-title="Wishlist" data-sub="o que você quer encontrar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20.5s-6.5-4-9-8.2C1.4 9.2 2.8 5.5 6.2 5.5c2 0 3.2 1.3 3.8 2.3.6-1 1.8-2.3 3.8-2.3 3.4 0 4.8 3.7 3.2 6.8-2.5 4.2-9 8.2-9 8.2z" stroke-linejoin="round"/></svg>Wishlist</div>

    <div class="sect">Sistema</div>
    <div class="nav" data-screen="settings" data-title="Configurações" data-sub="providers, qualidade e agenda">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2.8v2.8M12 18.4v2.8M21.2 12h-2.8M5.6 12H2.8M18.5 5.5l-2 2M7.5 16.5l-2 2M18.5 18.5l-2-2M7.5 7.5l-2-2" stroke-linecap="round"/></svg>Configurações</div>

/* ===== real album art via iTunes Search (JSONP) + gradient fallback ===== */
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return Math.abs(h)}
function grad(seed){const h=hash(seed),a=h%360,b=(a+45+h%70)%360;
  return `linear-gradient(140deg,hsl(${a} 52% 55%),hsl(${b} 48% 38%))`}
function ini(s){return s.split(/[\s\-–—]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()}
const coverCache={};
function jsonp(url){return new Promise(res=>{
  const cb='_cb'+Math.abs(hash(url))+Math.floor(performance.now());
  const s=document.createElement('script');
  window[cb]=d=>{res(d);delete window[cb];s.remove()};
  s.onerror=()=>{res(null);delete window[cb];s.remove()};
  s.src=url+'&callback='+cb;document.body.appendChild(s);
  setTimeout(()=>{if(window[cb]){res(null);delete window[cb];s.remove&&s.remove()}},6000);
})}
function realCover(term){
  if(coverCache[term])return coverCache[term];
  coverCache[term]=jsonp('https://itunes.apple.com/search?limit=1&entity=album&term='+encodeURIComponent(term))
    .then(d=>{const u=d&&d.results&&d.results[0]&&d.results[0].artworkUrl100;
      return u?u.replace('100x100bb','600x600bb'):null}).catch(()=>null);
  return coverCache[term];
}
/* cover element: gradient + initials now, real art hydrated async.
   pass css (w/h/border-radius) to size it inline. */
function cv(term,fs,css){return `<div class="cover" data-cover="${term.replace(/"/g,'')}" style="${css||''};background:${grad(term)}">
  <span class="ini" style="font-size:${fs||20}px">${ini(term)}</span></div>`}
function hydrate(){
  document.querySelectorAll('.cover[data-cover]:not([data-h])').forEach(el=>{
    el.setAttribute('data-h','1');
    realCover(el.getAttribute('data-cover')).then(u=>{if(u){
      const img=new Image();img.onload=()=>{el.style.backgroundImage=`url(${u})`;el.classList.add('loaded')};img.src=u;}});
  });
}

        <div class="set-row"><div class="k">Organizar automaticamente<small>renomear + tags + capa</small></div><div class="toggle on" onclick="this.classList.toggle('on')"><i></i></div></div>
        <div class="set-row"><div class="k">Deduplicar arquivos</div><div class="toggle on" onclick="this.classList.toggle('on')"><i></i></div></div>
        <div class="set-row"><div class="k">Compartilhar /music no Soulseek<small>desligado por padrão (uso pessoal)</small></div><div class="toggle" onclick="this.classList.toggle('on')"><i></i></div></div></div></div>
      <div class="panel reveal" style="animation-delay:.16s"><div class="panel-h"><h3>Agendamento</h3></div><div style="padding:4px 18px 16px">
        <div class="set-row"><div class="k">Sincronização automática<small>verificar playlists periodicamente</small></div><div class="toggle on" onclick="this.classList.toggle('on')"><i></i></div></div>
        <div class="set-row"><div class="k">Intervalo</div><select class="select"><option>30 min</option><option selected>1 hora</option><option>6 horas</option><option>diário</option></select></div>
        <div class="set-row"><div class="k">Modo econômico (RPi)<small>limita CPU/IO em horários definidos</small></div><div class="toggle" onclick="this.classList.toggle('on')"><i></i></div></div></div></div>
    </div>`;
}

/* live log */
let logTimer;const LOGS=[
  '[slskd] busca "metallica master of puppets" → 47 respostas',
  '[match] escolhido audiophile_99/Master of Puppets.flac · score 0.96',
  '[slskd] transfer iniciado · audiophile_99 · 24.1 MB',
  '[dl] Master of Puppets ······ 62% · 1.34 MB/s',
  '[organize] tags FLAC gravadas · capa 1200×1200 embutida',
  '[lib] → /music/Metallica/Master of Puppets/01 Battery.flac',
  '[spotify] snapshot inalterado · Prog Essentials · no-op',
  '[slskd] busca "pink floyd echoes live" → 0 fontes ≥ MP3 320'];
function paint(l){return l.replace(/\[(\w+)\]/,'<span style="color:var(--blue)">[$1]</span>')
  .replace(/(\d+%|\d+\.\d+ MB\/s|score \d\.\d+|\d+ respostas)/g,'<span style="color:var(--green)">$1</span>')
  .replace(/(0 fontes)/,'<span style="color:var(--red)">$1</span>')}
function buildLog(){const el=document.getElementById('log');if(!el)return;
  let lines=LOGS.slice(0,5).map(l=>`<div>${paint(l)}</div>`);el.innerHTML=lines.join('');let n=5;
  clearInterval(logTimer);logTimer=setInterval(()=>{if(!document.getElementById('log')){clearInterval(logTimer);return;}
    lines.push(`<div>${paint(LOGS[n%LOGS.length])}</div>`);if(lines.length>9)lines.shift();el.innerHTML=lines.join('');n++},1900)}

/* live progress */
setInterval(()=>{document.querySelectorAll('.prog[data-i]').forEach(p=>{const bar=p.querySelector('i');let w=parseFloat(bar.style.width);
  if(w<100){w=Math.min(100,w+Math.random()*2);bar.style.width=w+'%'}
  const s=document.querySelector(`.spd[data-spd="${p.dataset.i}"]`);if(s&&!s.textContent.includes('—'))s.textContent=(0.7+Math.random()*1.8).toFixed(2)+' MB/s'})},900);

/* router */
const R={dashboard:rDashboard,playlists:rPlaylists,downloads:rDownloads,library:rLibrary,wishlist:rWishlist,settings:rSettings,pdetail:rPDetail};
function go(scr,title,sub){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const tgt=scr==='pdetail'?'playlists':scr;document.getElementById(tgt).classList.add('active');R[scr]&&R[scr]();
  if(title){document.getElementById('title').childNodes[0].nodeValue=title+' ';document.getElementById('sub').textContent=sub||''}
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.screen===tgt));}
document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>go(n.dataset.screen,n.dataset.title,n.dataset.sub));
document.addEventListener('click',e=>{const g=e.target.closest('[data-goto]');if(!g)return;
  const m={downloads:['Downloads','transferências em tempo real'],playlists:['Playlists','sincronizadas do Spotify'],pdetail:['Prog Essentials','playlist · 142 faixas']};
  go(g.dataset.goto,m[g.dataset.goto]?.[0],m[g.dataset.goto]?.[1]);});
rDashboard();
</script>
